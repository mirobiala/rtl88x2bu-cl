name: Make OpenWRT Raspberry Pi 4 rtl88x2bu image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Install Requirements
        run: |
          sudo apt update
          sudo apt install tree build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file wget -y
      - name: Clone Repos
        run: |
          git clone https://git.openwrt.org/openwrt/openwrt.git
          cd openwrt
          git pull
          git checkout v21.02.7
      - name: Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      - name: Clone 88x2bu-openwrt repo
        run: |
          cd openwrt
          git clone https://github.com/mirobiala/rtl88x2bu-cl package/kernel/rtl88x2bu-cl
          cd package/kernel/rtl88x2bu-cl
          git checkout openwrt-21.02.7
      - name: Dump Configs
        run: |
          cd openwrt
          wget https://downloads.openwrt.org/releases/21.02.7/targets/bcm27xx/bcm2711/config.buildinfo -O .config
          sed -i "/CONFIG_TARGET_MULTI_PROFILE/d" .config
          sed -i "/CONFIG_TARGET_DEVICE_/d" .config
          echo "CONFIG_TARGET_MULTI_PROFILE=n" >> .config
          echo "CONFIG_TARGET_bcm27xx_bcm2711_DEVICE_rpi-4=y" >> .config
          echo "CONFIG_PACKAGE_kmod-rtl88x2bu-cl=y" >> .config
          make defconfig
      - name: Its Baking Time
        id: parallel_build
        continue-on-error: true
        run: |
           cd openwrt
           echo using $(nproc) cores
           make -j$(nproc)
      - name: Fallback build (single-threaded)
        if: steps.parallel_build.outcome == 'failure'
        run: |
           cd openwrt
           echo "Parallel build failed, retrying with -j1 for debugging..."
           make -j1 V=sc
      - uses: actions/upload-artifact@v6
        with:
          name: openwrt-21.02.7-rpi-4.gz
          path: openwrt/bin/targets/bcm27xx/bcm2711/*.img.gz
